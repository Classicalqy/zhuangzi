<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后人对前人的评价</title>
    <style>
      :root {
        --bg: #f3ecdf;
        --ink: #2d261b;
        --muted: #75634d;
        --line: #d8ccb8;
        --panel: #fff9ef;
        --accent: #8f642d;
        --yes: #2c8d50;
        --no: #c54842;
        --ref: #9f7a3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        color: var(--ink);
        background: radial-gradient(circle at 0% 0%, #fff7e8 0%, var(--bg) 55%, #ece0ce 100%);
        font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
      }

      .layout {
        height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        transition: grid-template-columns 0.22s ease;
      }

      .layout.sidebar-collapsed {
        grid-template-columns: 0 minmax(0, 1fr);
      }

      .sidebar {
        height: 100vh;
        padding: 16px 14px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #fbf3e4 0%, #f1e5d2 100%);
        overflow: auto;
        transition:
          opacity 0.18s ease,
          padding 0.18s ease,
          border-color 0.18s ease;
      }

      .layout.sidebar-collapsed .sidebar {
        opacity: 0;
        padding: 0;
        border-right-color: transparent;
        pointer-events: none;
      }

      .sidebar h1 {
        margin: 0;
        font-size: 25px;
      }

      .sidebar p {
        margin: 10px 0 14px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 14px;
      }

      .sidebar-block {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 251, 243, 0.72);
        padding: 10px;
      }

      .side-title {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .side-links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .side-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 15px;
      }

      .side-link.active {
        color: var(--ink);
        font-weight: 700;
      }

      .side-link:hover {
        text-decoration: underline;
      }

      .text-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .side-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .side-stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 6px 7px;
      }

      .side-stat-label {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .side-stat-value {
        margin-top: 2px;
        font-size: 16px;
      }

      .text-btn {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        font-size: 16px;
        background: rgba(255, 250, 239, 0.82);
        color: var(--ink);
        cursor: pointer;
      }

      .sidebar-toggle {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        min-height: 34px;
        padding: 0 12px;
        font-size: 14px;
        cursor: pointer;
        position: sticky;
        top: 0;
        z-index: 5;
        margin-bottom: 12px;
      }

      .sidebar-toggle:hover {
        border-color: var(--accent);
      }

      .text-btn:hover {
        border-color: var(--accent);
      }

      .text-btn.active {
        border-color: var(--accent);
        background: #f4e4ca;
        font-weight: 700;
      }

      .main {
        height: 100vh;
        padding: 18px 22px 28px;
        overflow: auto;
      }

      .head h2 {
        margin: 0;
        font-size: 30px;
      }

      .summary {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .search-box {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
      }

      .search-box input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fffdf8;
        font-size: 15px;
        color: var(--ink);
      }

      .search-box button {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 0 12px;
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
      }

      .search-box button:hover {
        border-color: var(--accent);
      }

      .search-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .search-results {
        margin-top: 8px;
        max-height: 230px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .search-result {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
      }

      .search-result:hover {
        border-color: var(--accent);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 1px 7px;
        margin-right: 8px;
        font-size: 12px;
        color: #fff;
        background: var(--accent);
      }

      .legend {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .legend-item {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: #fff;
      }

      .legend-item.y {
        color: var(--yes);
        border-color: #9ccdae;
      }

      .legend-item.n {
        color: var(--no);
        border-color: #e1aaa7;
      }

      .legend-item.ref {
        color: var(--ref);
        border-color: #d8c29b;
      }

      .sentence-block {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 251, 243, 0.92);
        padding: 14px;
      }

      .sentence-head {
        margin: 0;
        font-size: 20px;
      }

      .sentence-text {
        margin-top: 8px;
        border-left: 3px solid #d8c29b;
        padding: 8px 10px;
        line-height: 1.8;
        background: #fffdf8;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .sentence-highlight {
        background: #ffe6a8;
        color: inherit;
        border-radius: 3px;
        padding: 0 1px;
      }

      .groups {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .group-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 12px;
      }

      .group-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: minmax(0, 1.9fr) minmax(0, 1fr);
        gap: 12px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fffdf8;
        padding: 10px;
      }

      .panel-note {
        margin-top: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .graph-shell {
        position: relative;
        margin-top: 8px;
      }

      .graph-columns {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 130px;
      }

      .graph-col {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .graph-node {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 8px;
      }

      .graph-node .author {
        font-size: 12px;
        color: var(--muted);
      }

      .graph-node .text {
        margin-top: 4px;
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .graph-svg {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .ref-list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .ref-item {
        border: 1px solid #d8c29b;
        border-radius: 9px;
        background: #fffdf8;
        padding: 8px;
      }

      .ref-author {
        font-size: 12px;
        color: #8d6a2c;
      }

      .ref-text {
        margin-top: 3px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .empty {
        color: var(--muted);
        margin-top: 8px;
      }

      @media (max-width: 1100px) {
        body {
          height: auto;
          min-height: 100vh;
          overflow: auto;
        }

        .layout {
          height: auto;
          min-height: 100vh;
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .layout.sidebar-collapsed {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr;
        }

        .sidebar {
          height: auto;
          max-height: none;
          overflow: visible;
          border-right: none;
          border-bottom: 1px solid var(--line);
        }

        .layout.sidebar-collapsed .sidebar {
          display: none;
        }

        .main {
          height: auto;
          min-height: 0;
          overflow: visible;
        }

        .sidebar-toggle {
          position: static;
        }

        .text-list {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .group-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .search-box {
          grid-template-columns: 1fr 1fr;
        }

        .search-box input {
          grid-column: 1 / -1;
        }

        .text-list {
          grid-template-columns: 1fr;
        }

        .graph-columns {
          grid-template-columns: 1fr;
          row-gap: 10px;
        }

        .graph-svg {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>后人对前人的评价</h1>
        <p>按分句查看注疏评价关系。绿色表示支持，红色表示否定；无态度记录作为“参考”展示。</p>

        <section class="sidebar-block">
          <h3 class="side-title">平台目录</h3>
          <nav class="side-links">
            <a class="side-link" href="index.html">首页</a>
            <a class="side-link" href="reader.html">庄子注疏可视化</a>
            <a class="side-link active" href="criticism.html">后人对前人的评价</a>
            <a class="side-link" href="philosophy.html">哲学词典</a>
          </nav>
        </section>

        <section class="sidebar-block">
          <h3 class="side-title">数据概览</h3>
          <div id="sideStats" class="side-stats"></div>
        </section>

        <section class="sidebar-block">
          <h3 class="side-title">篇章目录</h3>
          <div id="textList" class="text-list"></div>
        </section>
      </aside>

      <main class="main">
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="true">收起目录</button>
        <section class="head">
          <h2 id="title"></h2>
          <div id="summary" class="summary"></div>
          <div class="legend">
            <span class="legend-item y">Y 支持（绿）</span>
            <span class="legend-item n">N 否定（红）</span>
            <span class="legend-item ref">无态度：参考（不画箭头）</span>
          </div>
          <div class="search-box">
            <input id="searchInput" type="text" placeholder="搜索评价关系/参考条目/原文（全部篇章）" />
            <button id="searchBtn" type="button">搜索</button>
            <button id="clearSearchBtn" type="button">清空</button>
          </div>
          <div id="searchMeta" class="search-meta"></div>
          <div id="searchResults" class="search-results"></div>
        </section>

        <div id="sentenceContainer"></div>
      </main>
    </div>

    <script src="criticism_data.js"></script>
    <script>
      (function () {
        const data = window.CRITICISM_DATA;
        if (!data || !Array.isArray(data.texts) || data.texts.length === 0) {
          document.body.innerHTML = '<p style="padding:20px;">评价数据未加载成功，请先运行 generate_criticism_data.py。</p>';
          return;
        }

        const layoutEl = document.querySelector(".layout");
        const sidebarToggleEl = document.getElementById("sidebarToggle");
        const textListEl = document.getElementById("textList");
        const sideStatsEl = document.getElementById("sideStats");
        const titleEl = document.getElementById("title");
        const summaryEl = document.getElementById("summary");
        const sentenceContainerEl = document.getElementById("sentenceContainer");
        const searchInputEl = document.getElementById("searchInput");
        const searchBtnEl = document.getElementById("searchBtn");
        const clearSearchBtnEl = document.getElementById("clearSearchBtn");
        const searchMetaEl = document.getElementById("searchMeta");
        const searchResultsEl = document.getElementById("searchResults");

        const textById = new Map(data.texts.map((item) => [item.text_id, item]));
        const state = {
          currentTextId: data.texts[0].text_id,
          sidebarCollapsed: false,
        };
        const SIDEBAR_COLLAPSE_KEY = "zz_sidebar_collapsed";

        function currentText() {
          return textById.get(state.currentTextId);
        }

        function queryTextId() {
          const raw = new URLSearchParams(window.location.search).get("text_id");
          const id = Number.parseInt(raw || "", 10);
          if (Number.isNaN(id)) return null;
          return textById.has(id) ? id : null;
        }

        function syncQueryTextId(textId) {
          const url = new URL(window.location.href);
          url.searchParams.set("text_id", String(textId));
          history.replaceState(null, "", `${url.pathname}?${url.searchParams.toString()}`);
        }

        function setSidebarCollapsed(collapsed) {
          state.sidebarCollapsed = Boolean(collapsed);
          layoutEl.classList.toggle("sidebar-collapsed", state.sidebarCollapsed);
          sidebarToggleEl.textContent = state.sidebarCollapsed ? "展开目录" : "收起目录";
          sidebarToggleEl.setAttribute("aria-expanded", state.sidebarCollapsed ? "false" : "true");
          try {
            localStorage.setItem(SIDEBAR_COLLAPSE_KEY, state.sidebarCollapsed ? "1" : "0");
          } catch (_) {}
        }

        function escapeHtml(raw) {
          return String(raw)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function snippet(text, max = 70) {
          const raw = String(text || "");
          return raw.length > max ? raw.slice(0, max) + "..." : raw;
        }

        function clearSearchResults() {
          searchMetaEl.textContent = "";
          searchResultsEl.innerHTML = "";
        }

        function runInTextContext(textId, callback) {
          const targetId = Number(textId);
          if (!Number.isInteger(targetId) || !textById.has(targetId)) {
            callback(currentText());
            return;
          }

          const switched = state.currentTextId !== targetId;
          if (switched) {
            state.currentTextId = targetId;
            syncQueryTextId(targetId);
            renderAll();
            requestAnimationFrame(() => {
              callback(textById.get(targetId));
            });
            return;
          }

          callback(textById.get(targetId));
        }

        function normalizeHighlightTerms(terms) {
          if (!Array.isArray(terms) || !terms.length) return [];
          const out = [];
          const seen = new Set();
          terms.forEach((item) => {
            if (typeof item !== "string") return;
            item
              .split(/[\n\r,，、;；/|]+/)
              .map((s) => s.trim())
              .filter(Boolean)
              .forEach((term) => {
                if (!seen.has(term)) {
                  seen.add(term);
                  out.push(term);
                }
              });
          });
          return out;
        }

        function renderSentenceWithHighlights(sentence, terms) {
          const text = typeof sentence === "string" ? sentence : "";
          if (!text) return "";
          const normalizedTerms = normalizeHighlightTerms(terms).sort((a, b) => b.length - a.length);
          if (!normalizedTerms.length) return escapeHtml(text);

          const ranges = [];
          normalizedTerms.forEach((term) => {
            let from = 0;
            while (from < text.length) {
              const idx = text.indexOf(term, from);
              if (idx < 0) break;
              ranges.push([idx, idx + term.length]);
              from = idx + term.length;
            }
          });

          if (!ranges.length) return escapeHtml(text);
          ranges.sort((a, b) => a[0] - b[0] || a[1] - b[1]);

          const merged = [];
          ranges.forEach(([start, end]) => {
            const prev = merged[merged.length - 1];
            if (!prev || start > prev[1]) {
              merged.push([start, end]);
            } else if (end > prev[1]) {
              prev[1] = end;
            }
          });

          let cursor = 0;
          let html = "";
          merged.forEach(([start, end]) => {
            if (start > cursor) {
              html += escapeHtml(text.slice(cursor, start));
            }
            html += `<mark class="sentence-highlight">${escapeHtml(text.slice(start, end))}</mark>`;
            cursor = end;
          });
          if (cursor < text.length) {
            html += escapeHtml(text.slice(cursor));
          }
          return html;
        }

        function dedupeGraph(relations) {
          const sourceMap = new Map();
          const targetMap = new Map();
          const edgeMap = new Map();

          const sources = [];
          const targets = [];

          function sourceId(author, text) {
            const key = `${author}||${text}`;
            if (!sourceMap.has(key)) {
              const id = `s${sources.length + 1}`;
              sourceMap.set(key, id);
              sources.push({ id, key, author, text });
            }
            return sourceMap.get(key);
          }

          function targetId(author, text) {
            const key = `${author}||${text}`;
            if (!targetMap.has(key)) {
              const id = `t${targets.length + 1}`;
              targetMap.set(key, id);
              targets.push({ id, key, author, text });
            }
            return targetMap.get(key);
          }

          relations.forEach((item) => {
            const sid = sourceId(item.from_author || "未署名", item.from_text || "（无原文）");
            const tid = targetId(item.to_author || "未署名", item.eval_text || "（无评价语）");
            const stance = item.stance === "Y" ? "Y" : "N";
            const edgeKey = `${sid}>${tid}>${stance}`;
            if (!edgeMap.has(edgeKey)) {
              edgeMap.set(edgeKey, {
                source_id: sid,
                target_id: tid,
                stance,
              });
            }
          });

          return {
            sources,
            targets,
            edges: Array.from(edgeMap.values()),
          };
        }

        function createNode(node, cls) {
          const el = document.createElement("article");
          el.className = `graph-node ${cls}`;
          el.dataset.nodeId = node.id;
          el.innerHTML = `<div class="author">${node.author}</div><div class="text">${node.text}</div>`;
          return el;
        }

        function drawEdges(shell, edges) {
          const svg = shell.querySelector(".graph-svg");
          if (!svg) return;

          const shellRect = shell.getBoundingClientRect();
          const width = Math.max(220, Math.round(shellRect.width));
          const height = Math.max(100, Math.round(shell.scrollHeight));
          svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
          svg.setAttribute("width", String(width));
          svg.setAttribute("height", String(height));
          svg.innerHTML = "";

          edges.forEach((edge) => {
            const sourceEl = shell.querySelector(`[data-node-id="${edge.source_id}"]`);
            const targetEl = shell.querySelector(`[data-node-id="${edge.target_id}"]`);
            if (!sourceEl || !targetEl) return;

            const sRect = sourceEl.getBoundingClientRect();
            const tRect = targetEl.getBoundingClientRect();

            const x1 = sRect.right - shellRect.left + 2;
            const y1 = sRect.top - shellRect.top + sRect.height / 2;
            const x2 = tRect.left - shellRect.left - 2;
            const y2 = tRect.top - shellRect.top + tRect.height / 2;
            const midX = (x1 + x2) / 2;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", edge.stance === "Y" ? "#2c8d50" : "#c54842");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("opacity", "0.95");
            path.setAttribute("stroke-linecap", "round");
            svg.appendChild(path);
          });
        }

        function renderGraphPanel(group) {
          const panel = document.createElement("section");
          panel.className = "panel";

          if (!group.relations || group.relations.length === 0) {
            const empty = document.createElement("p");
            empty.className = "panel-note";
            empty.textContent = "本组无评价关系。";
            panel.appendChild(empty);
            return panel;
          }

          const graph = dedupeGraph(group.relations);

          const shell = document.createElement("div");
          shell.className = "graph-shell";

          const columns = document.createElement("div");
          columns.className = "graph-columns";

          const left = document.createElement("div");
          left.className = "graph-col";
          graph.sources.forEach((node) => left.appendChild(createNode(node, "source")));

          const right = document.createElement("div");
          right.className = "graph-col";
          graph.targets.forEach((node) => right.appendChild(createNode(node, "target")));

          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.classList.add("graph-svg");

          columns.appendChild(left);
          columns.appendChild(right);
          shell.appendChild(svg);
          shell.appendChild(columns);
          panel.appendChild(shell);

          requestAnimationFrame(() => drawEdges(shell, graph.edges));
          return panel;
        }

        function renderRefPanel(group) {
          const panel = document.createElement("section");
          panel.className = "panel";

          const refs = group.references || [];
          if (!refs.length) {
            const empty = document.createElement("p");
            empty.className = "panel-note";
            empty.textContent = "无参考条目。";
            panel.appendChild(empty);
            return panel;
          }

          const list = document.createElement("div");
          list.className = "ref-list";
          refs.forEach((item) => {
            const card = document.createElement("article");
            card.className = "ref-item";
            card.innerHTML = `<div class="ref-author">${item.ref_author || "未署名"}</div><div class="ref-text">${item.ref_text || "（空）"}</div>`;
            list.appendChild(card);
          });
          panel.appendChild(list);
          return panel;
        }

        function renderTextList() {
          textListEl.innerHTML = "";
          data.texts.forEach((text) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "text-btn" + (text.text_id === state.currentTextId ? " active" : "");
            btn.textContent = text.text_title;
            btn.addEventListener("click", () => {
              state.currentTextId = text.text_id;
              syncQueryTextId(text.text_id);
              renderAll();
            });
            textListEl.appendChild(btn);
          });
        }

        function scrollToSentenceBlock(sentenceId) {
          const target = sentenceContainerEl.querySelector(`.sentence-block[data-sentence-id="${sentenceId}"]`);
          if (!target) return;
          target.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        function renderSearchResults(results, query) {
          searchResultsEl.innerHTML = "";
          searchMetaEl.textContent = `关键词“${query}”命中 ${results.length} 条（全部篇章）。`;

          if (!results.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "没有匹配结果。";
            searchResultsEl.appendChild(empty);
            return;
          }

          results.slice(0, 120).forEach((item) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "search-result";

            const label = document.createElement("span");
            label.className = "badge";
            label.textContent = item.type;

            const text = document.createElement("span");
            text.textContent = item.summary;

            btn.appendChild(label);
            btn.appendChild(text);

            btn.addEventListener("click", () => {
              runInTextContext(item.textId, () => {
                scrollToSentenceBlock(item.sentenceId);
              });
            });

            searchResultsEl.appendChild(btn);
          });

          if (results.length > 120) {
            const tip = document.createElement("p");
            tip.className = "empty";
            tip.textContent = "结果过多，仅展示前 120 条。";
            searchResultsEl.appendChild(tip);
          }
        }

        function doSearch() {
          const query = searchInputEl.value.trim();
          if (!query) {
            clearSearchResults();
            return;
          }

          const results = [];
          const seen = new Set();

          data.texts.forEach((text) => {
            const groups = Array.isArray(text.groups) ? text.groups : [];
            const sentenceSeen = new Set();

            groups.forEach((group) => {
              const sentenceId = Number(group.sentence_id);
              if (!Number.isInteger(sentenceId)) return;

              const sentenceText = String(group.sentence || "");
              const sentenceKey = `${text.text_id}|S|${sentenceId}`;
              if (!sentenceSeen.has(sentenceId) && sentenceText.includes(query)) {
                sentenceSeen.add(sentenceId);
                seen.add(sentenceKey);
                results.push({
                  kind: "sentence",
                  type: "原文",
                  textId: text.text_id,
                  sentenceId,
                  summary: `【${text.text_title}】第 ${sentenceId} 句：${snippet(sentenceText, 80)}`,
                });
              }

              (group.relations || []).forEach((rel, idx) => {
                const source = `${rel.from_author || ""}${rel.from_text || ""}${rel.to_author || ""}${rel.eval_text || ""}${rel.stance || ""}`;
                if (!source.includes(query)) return;
                const key = `${text.text_id}|R|${sentenceId}|${idx}|${rel.from_author || ""}|${rel.to_author || ""}|${rel.eval_text || ""}`;
                if (seen.has(key)) return;
                seen.add(key);
                const stanceLabel = rel.stance === "Y" ? "支持" : rel.stance === "N" ? "否定" : "关系";
                results.push({
                  kind: "relation",
                  type: "评价",
                  textId: text.text_id,
                  sentenceId,
                  summary: `【${text.text_title}】第 ${sentenceId} 句｜${rel.from_author || "未署名"}→${rel.to_author || "未署名"}（${stanceLabel}）：${snippet(rel.eval_text || rel.from_text || "（空）", 66)}`,
                });
              });

              (group.references || []).forEach((ref, idx) => {
                const source = `${ref.ref_author || ""}${ref.ref_text || ""}`;
                if (!source.includes(query)) return;
                const key = `${text.text_id}|F|${sentenceId}|${idx}|${ref.ref_author || ""}|${ref.ref_text || ""}`;
                if (seen.has(key)) return;
                seen.add(key);
                results.push({
                  kind: "reference",
                  type: "参考",
                  textId: text.text_id,
                  sentenceId,
                  summary: `【${text.text_title}】第 ${sentenceId} 句｜${ref.ref_author || "未署名"}：${snippet(ref.ref_text || "（空）", 66)}`,
                });
              });
            });
          });

          renderSearchResults(results, query);
        }

        function renderHeader() {
          const text = currentText();
          titleEl.textContent = `${text.text_title}｜后人对前人的评价`;
          summaryEl.textContent = `共 ${text.group_count} 组评价单元；评价关系 ${text.relation_count} 条；参考条目 ${text.reference_count} 条。`;
        }

        function renderSidebarStats() {
          const text = currentText();
          const stats = [
            { label: "总篇章", value: data.texts.length },
            { label: "总组数", value: data.meta?.group_count ?? "-" },
            { label: "当前组数", value: text.group_count ?? "-" },
            { label: "当前关系", value: text.relation_count ?? "-" },
          ];

          sideStatsEl.innerHTML = "";
          stats.forEach((item) => {
            const card = document.createElement("div");
            card.className = "side-stat";
            card.innerHTML = `<div class="side-stat-label">${item.label}</div><div class="side-stat-value">${item.value}</div>`;
            sideStatsEl.appendChild(card);
          });
        }

        function renderSentenceBlocks() {
          const text = currentText();
          sentenceContainerEl.innerHTML = "";

          if (!text.groups || text.groups.length === 0) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "暂无该篇章评价数据。";
            sentenceContainerEl.appendChild(empty);
            return;
          }

          const sentenceMap = new Map();
          text.groups.forEach((group) => {
            const key = String(group.sentence_id);
            if (!sentenceMap.has(key)) {
              sentenceMap.set(key, {
                sentence_id: group.sentence_id,
                sentence: group.sentence,
                highlights: [],
                groups: [],
              });
            }
            const bucket = sentenceMap.get(key);
            bucket.groups.push(group);
            (group.highlights || []).forEach((term) => {
              if (typeof term !== "string") return;
              const clean = term.trim();
              if (clean && !bucket.highlights.includes(clean)) {
                bucket.highlights.push(clean);
              }
            });
          });

          Array.from(sentenceMap.values())
            .sort((a, b) => a.sentence_id - b.sentence_id)
            .forEach((sentenceBlock) => {
              const block = document.createElement("section");
              block.className = "sentence-block";
              block.dataset.sentenceId = String(sentenceBlock.sentence_id);

              const head = document.createElement("h3");
              head.className = "sentence-head";
              head.textContent = `第 ${sentenceBlock.sentence_id} 句`;

              const sentenceEl = document.createElement("div");
              sentenceEl.className = "sentence-text";
              const sentenceText = sentenceBlock.sentence || "（未找到原句）";
              sentenceEl.innerHTML = renderSentenceWithHighlights(sentenceText, sentenceBlock.highlights || []);

              const groupsEl = document.createElement("div");
              groupsEl.className = "groups";

              sentenceBlock.groups.forEach((group) => {
                const card = document.createElement("article");
                card.className = "group-card";

                const grid = document.createElement("div");
                grid.className = "group-grid";
                grid.appendChild(renderGraphPanel(group));
                grid.appendChild(renderRefPanel(group));

                card.appendChild(grid);
                groupsEl.appendChild(card);
              });

              block.appendChild(head);
              block.appendChild(sentenceEl);
              block.appendChild(groupsEl);
              sentenceContainerEl.appendChild(block);
            });
        }

        let resizeTimer = null;
        window.addEventListener("resize", () => {
          if (resizeTimer) clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            renderSentenceBlocks();
          }, 120);
        });

        sidebarToggleEl.addEventListener("click", () => {
          setSidebarCollapsed(!state.sidebarCollapsed);
        });

        searchBtnEl.addEventListener("click", doSearch);
        clearSearchBtnEl.addEventListener("click", () => {
          searchInputEl.value = "";
          clearSearchResults();
        });
        searchInputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter") doSearch();
        });

        try {
          setSidebarCollapsed(localStorage.getItem(SIDEBAR_COLLAPSE_KEY) === "1");
        } catch (_) {
          setSidebarCollapsed(false);
        }

        function renderAll() {
          renderTextList();
          renderSidebarStats();
          renderHeader();
          renderSentenceBlocks();
        }

        state.currentTextId = queryTextId() ?? state.currentTextId;
        syncQueryTextId(state.currentTextId);
        renderAll();
      })();
    </script>
  </body>
</html>
