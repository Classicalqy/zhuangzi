<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哲学词典</title>
    <style>
      :root {
        --bg: #f2eddc;
        --ink: #2a2318;
        --muted: #6e5e48;
        --line: #d4c7ae;
        --panel: #fffaf0;
        --accent: #7e5a2b;
        --chip: #f2dfbd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 0% 0%, #fff7e7 0%, transparent 45%),
          radial-gradient(circle at 100% 100%, #e6d7bc 0%, transparent 52%),
          var(--bg);
        font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
      }

      .layout {
        height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        transition: grid-template-columns 0.22s ease;
      }

      .layout.sidebar-collapsed {
        grid-template-columns: 0 minmax(0, 1fr);
      }

      .sidebar {
        height: 100vh;
        padding: 16px 14px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #f9f1e2 0%, #efe2cc 100%);
        overflow: auto;
        transition:
          opacity 0.18s ease,
          padding 0.18s ease,
          border-color 0.18s ease;
      }

      .layout.sidebar-collapsed .sidebar {
        opacity: 0;
        padding: 0;
        border-right-color: transparent;
        pointer-events: none;
      }

      .sidebar h1 {
        margin: 0;
        font-size: 26px;
      }

      .sidebar p {
        margin: 10px 0 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .sidebar-block {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 251, 243, 0.72);
        padding: 10px;
      }

      .side-title {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .side-links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .side-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 15px;
      }

      .side-link.active {
        color: var(--ink);
        font-weight: 700;
      }

      .side-link:hover {
        text-decoration: underline;
      }

      .text-list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .side-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .side-stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 6px 7px;
      }

      .side-stat-label {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .side-stat-value {
        margin-top: 2px;
        font-size: 16px;
      }

      .text-btn {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        font-size: 16px;
        color: var(--ink);
        background: rgba(255, 250, 239, 0.86);
        cursor: pointer;
      }

      .sidebar-toggle {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        min-height: 34px;
        padding: 0 12px;
        font-size: 14px;
        cursor: pointer;
        position: sticky;
        top: 0;
        z-index: 5;
        margin-bottom: 12px;
      }

      .sidebar-toggle:hover {
        border-color: var(--accent);
      }

      .text-btn:hover {
        border-color: var(--accent);
      }

      .text-btn.active {
        border-color: var(--accent);
        background: #f5e6cb;
        font-weight: 700;
      }

      .main {
        height: 100vh;
        padding: 18px 22px 28px;
        overflow: auto;
      }

      .head h2 {
        margin: 0;
        font-size: 30px;
      }

      .summary {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .toolbar {
        margin-top: 12px;
      }

      .search {
        width: min(440px, 100%);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
        font-size: 14px;
        background: #fffef9;
        color: var(--ink);
      }

      .concept-list {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .concept-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 12px;
      }

      .concept-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .concept-title {
        margin: 0;
        font-size: 24px;
      }

      .chip {
        flex: 0 0 auto;
        border: 1px solid #ccb48c;
        border-radius: 999px;
        padding: 3px 9px;
        background: var(--chip);
        font-size: 12px;
        color: #5f471f;
      }

      .scope {
        margin-top: 10px;
        line-height: 1.85;
        white-space: pre-wrap;
      }

      .notes {
        margin-top: 12px;
      }

      .notes-title {
        margin: 0;
        font-size: 15px;
        color: var(--muted);
      }

      .note-list {
        margin: 8px 0 0;
        padding-left: 20px;
        display: grid;
        gap: 8px;
      }

      .note-item {
        line-height: 1.75;
        white-space: pre-wrap;
      }

      .empty {
        color: var(--muted);
        margin-top: 10px;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
        }

        .layout.sidebar-collapsed .sidebar {
          display: none;
        }

        .text-list {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .text-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>哲学词典</h1>
        <p>按篇章查看概念、内涵外延和注家条目。可在右侧输入关键词筛选词条。</p>

        <section class="sidebar-block">
          <h3 class="side-title">平台目录</h3>
          <nav class="side-links">
            <a class="side-link" href="index.html">首页</a>
            <a class="side-link" href="reader.html">庄子注疏可视化</a>
            <a class="side-link" href="criticism.html">后人对前人的评价</a>
            <a class="side-link active" href="philosophy.html">哲学词典</a>
          </nav>
        </section>

        <section class="sidebar-block">
          <h3 class="side-title">数据概览</h3>
          <div id="sideStats" class="side-stats"></div>
        </section>

        <section class="sidebar-block">
          <h3 class="side-title">篇章目录</h3>
          <div id="textList" class="text-list"></div>
        </section>
      </aside>

      <main class="main">
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="true">收起目录</button>
        <section class="head">
          <h2 id="title"></h2>
          <div id="summary" class="summary"></div>
          <div class="toolbar">
            <input id="searchInput" class="search" type="search" placeholder="检索概念、内涵外延、注释内容" />
          </div>
        </section>
        <div id="conceptList" class="concept-list"></div>
      </main>
    </div>

    <script src="philosophy_data.js"></script>
    <script>
      (function () {
        const data = window.PHILOSOPHY_DATA;
        if (!data || !Array.isArray(data.texts) || data.texts.length === 0) {
          document.body.innerHTML = '<p style="padding:20px;">词典数据未加载成功，请先运行 generate_philosophy_data.py。</p>';
          return;
        }

        const layoutEl = document.querySelector(".layout");
        const sidebarToggleEl = document.getElementById("sidebarToggle");
        const textListEl = document.getElementById("textList");
        const sideStatsEl = document.getElementById("sideStats");
        const titleEl = document.getElementById("title");
        const summaryEl = document.getElementById("summary");
        const conceptListEl = document.getElementById("conceptList");
        const searchInputEl = document.getElementById("searchInput");

        const textById = new Map(data.texts.map((item) => [item.text_id, item]));
        const state = {
          currentTextId: data.texts[0].text_id,
          keyword: "",
          sidebarCollapsed: false,
        };
        const SIDEBAR_COLLAPSE_KEY = "zz_sidebar_collapsed";

        function currentText() {
          return textById.get(state.currentTextId);
        }

        function queryTextId() {
          const raw = new URLSearchParams(window.location.search).get("text_id");
          const id = Number.parseInt(raw || "", 10);
          if (Number.isNaN(id)) return null;
          return textById.has(id) ? id : null;
        }

        function syncQueryTextId(textId) {
          const url = new URL(window.location.href);
          url.searchParams.set("text_id", String(textId));
          history.replaceState(null, "", `${url.pathname}?${url.searchParams.toString()}`);
        }

        function setSidebarCollapsed(collapsed) {
          state.sidebarCollapsed = Boolean(collapsed);
          layoutEl.classList.toggle("sidebar-collapsed", state.sidebarCollapsed);
          sidebarToggleEl.textContent = state.sidebarCollapsed ? "展开目录" : "收起目录";
          sidebarToggleEl.setAttribute("aria-expanded", state.sidebarCollapsed ? "false" : "true");
          try {
            localStorage.setItem(SIDEBAR_COLLAPSE_KEY, state.sidebarCollapsed ? "1" : "0");
          } catch (_) {}
        }

        function escapeHtml(raw) {
          return String(raw)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function filteredConcepts(text) {
          const concepts = Array.isArray(text.concepts) ? text.concepts : [];
          const keyword = state.keyword.trim();
          if (!keyword) return concepts;

          return concepts.filter((item) => {
            const fields = [item.concept || "", item.scope || "", ...(item.notes || [])];
            return fields.some((value) => String(value).includes(keyword));
          });
        }

        function renderTextList() {
          textListEl.innerHTML = "";
          data.texts.forEach((text) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "text-btn" + (text.text_id === state.currentTextId ? " active" : "");
            btn.textContent = text.text_title;
            btn.addEventListener("click", () => {
              state.currentTextId = text.text_id;
              syncQueryTextId(text.text_id);
              renderAll();
            });
            textListEl.appendChild(btn);
          });
        }

        function renderHeader() {
          const text = currentText();
          const filtered = filteredConcepts(text);
          titleEl.textContent = `${text.text_title}｜哲学词典`;
          summaryEl.textContent = `词条 ${text.concept_count} 条；注释 ${text.note_count} 条。当前筛选命中 ${filtered.length} 条。`;
        }

        function renderSidebarStats() {
          const text = currentText();
          const filtered = filteredConcepts(text);
          const stats = [
            { label: "总篇章", value: data.texts.length },
            { label: "总词条", value: data.meta?.concept_count ?? "-" },
            { label: "当前词条", value: text.concept_count ?? "-" },
            { label: "筛选命中", value: filtered.length },
          ];

          sideStatsEl.innerHTML = "";
          stats.forEach((item) => {
            const card = document.createElement("div");
            card.className = "side-stat";
            card.innerHTML = `<div class="side-stat-label">${item.label}</div><div class="side-stat-value">${item.value}</div>`;
            sideStatsEl.appendChild(card);
          });
        }

        function renderConcepts() {
          const text = currentText();
          const list = filteredConcepts(text);
          conceptListEl.innerHTML = "";

          if (!list.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "当前筛选无匹配词条。";
            conceptListEl.appendChild(empty);
            return;
          }

          list.forEach((item) => {
            const notes = Array.isArray(item.notes) ? item.notes : [];
            const card = document.createElement("article");
            card.className = "concept-card";

            const notesHtml = notes.length
              ? `<ol class="note-list">${notes
                  .map((note) => `<li class="note-item">${escapeHtml(note)}</li>`)
                  .join("")}</ol>`
              : '<p class="empty">暂无注释条目。</p>';

            card.innerHTML = `
              <div class="concept-head">
                <h3 class="concept-title">${escapeHtml(item.concept || "（未命名概念）")}</h3>
                <span class="chip">${notes.length} 注</span>
              </div>
              <div class="scope">${escapeHtml(item.scope || "（暂无内涵外延）")}</div>
              <section class="notes">
                <h4 class="notes-title">注释</h4>
                ${notesHtml}
              </section>
            `;

            conceptListEl.appendChild(card);
          });
        }

        function renderAll() {
          renderTextList();
          renderSidebarStats();
          renderHeader();
          renderConcepts();
        }

        searchInputEl.addEventListener("input", () => {
          state.keyword = searchInputEl.value || "";
          renderSidebarStats();
          renderHeader();
          renderConcepts();
        });

        sidebarToggleEl.addEventListener("click", () => {
          setSidebarCollapsed(!state.sidebarCollapsed);
        });

        try {
          setSidebarCollapsed(localStorage.getItem(SIDEBAR_COLLAPSE_KEY) === "1");
        } catch (_) {
          setSidebarCollapsed(false);
        }

        state.currentTextId = queryTextId() ?? state.currentTextId;
        syncQueryTextId(state.currentTextId);
        renderAll();
      })();
    </script>
  </body>
</html>
