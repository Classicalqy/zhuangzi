<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>庄子注疏数字首页</title>
    <style>
      :root {
        --bg-1: #f8f0df;
        --bg-2: #e9d9bc;
        --ink: #2f2517;
        --muted: #6e5b40;
        --line: #ceb794;
        --accent: #7b5322;
        --accent-soft: #f3ddbb;
        --card: rgba(255, 250, 240, 0.88);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
        background:
          radial-gradient(circle at 0% 0%, #fff8ea 0%, transparent 44%),
          radial-gradient(circle at 100% 100%, #e5cda5 0%, transparent 48%),
          linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .wrap {
        width: min(1100px, calc(100% - 32px));
        margin: 24px auto 40px;
      }

      .hero {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 26px 24px;
        background: linear-gradient(120deg, rgba(255, 247, 230, 0.95) 0%, rgba(241, 221, 188, 0.92) 100%);
        box-shadow: 0 12px 24px rgba(89, 61, 28, 0.08);
      }

      .eyebrow {
        display: inline-block;
        padding: 4px 10px;
        border: 1px solid #b99768;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: clamp(28px, 6vw, 46px);
        line-height: 1.1;
      }

      .sub {
        margin: 0;
        max-width: 700px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.75;
      }

      .cta-row {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 0 16px;
        text-decoration: none;
        color: var(--ink);
        background: #fff;
      }

      .cta.primary {
        border-color: #80592b;
        color: #fff;
        background: linear-gradient(180deg, #92642f 0%, #755024 100%);
      }

      .stats {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 252, 246, 0.9);
      }

      .stat .label {
        font-size: 12px;
        color: var(--muted);
      }

      .stat .value {
        margin-top: 4px;
        font-size: 24px;
        font-weight: 700;
      }

      .section {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 16px;
      }

      .section h2 {
        margin: 0;
        font-size: 22px;
      }

      .section p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .text-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .text-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffdf8;
        padding: 14px;
      }

      .text-card h3 {
        margin: 0;
        font-size: 21px;
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .text-card a {
        display: inline-flex;
        margin-top: 12px;
        text-decoration: none;
        color: var(--accent);
        font-weight: 600;
      }

      .footer {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .error {
        margin-top: 12px;
        border-radius: 10px;
        border: 1px solid #be8b7a;
        background: #fff5f0;
        color: #9c3f29;
        padding: 10px 12px;
      }

      @media (max-width: 900px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .text-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <span class="eyebrow">庄子文本工程</span>
        <h1>庄子注疏数字阅读</h1>
        <p class="sub">基于校对后的结构化数据，提供分句浏览、字义注释查看、跨句阐释定位与检索。可从下方篇章卡片直接进入对应阅读页。</p>

        <div class="cta-row">
          <a class="cta primary" href="reader.html">进入总阅读器</a>
          <a class="cta" href="reader.html?text_id=1">从人间世开始</a>
          <a class="cta" href="criticism.html">后人对古人的评价</a>
        </div>

        <div class="stats" id="stats"></div>
        <div class="footer" id="generatedAt"></div>
        <div class="error" id="error" style="display: none"></div>
      </section>

      <section class="section">
        <h2>篇章入口</h2>
        <p>点击任一篇章可跳转到阅读页并自动切换到对应文本。</p>
        <div class="text-grid" id="textGrid"></div>
      </section>
    </div>

    <script src="data.js"></script>
    <script>
      (function () {
        const statsEl = document.getElementById("stats");
        const gridEl = document.getElementById("textGrid");
        const generatedAtEl = document.getElementById("generatedAt");
        const errorEl = document.getElementById("error");

        function renderError(message) {
          errorEl.style.display = "block";
          errorEl.textContent = message;
        }

        const data = window.ZZ_DATA;
        if (!data || !Array.isArray(data.texts) || data.texts.length === 0) {
          renderError("数据未加载成功，请先执行 generate_web_data.py 生成 data.js。");
          return;
        }

        const meta = data.meta || {};
        const stats = [
          { label: "篇章数", value: meta.text_count ?? data.texts.length },
          { label: "分句数", value: meta.sentence_count ?? "-" },
          { label: "注释句键", value: meta.annotation_key_count ?? "-" },
          { label: "跨句阐释", value: meta.interpretation_count ?? "-" },
        ];

        stats.forEach((item) => {
          const node = document.createElement("div");
          node.className = "stat";
          node.innerHTML = `<div class="label">${item.label}</div><div class="value">${item.value}</div>`;
          statsEl.appendChild(node);
        });

        if (meta.generated_at) {
          const dt = new Date(meta.generated_at);
          const display = Number.isNaN(dt.getTime()) ? meta.generated_at : dt.toLocaleString("zh-CN", { hour12: false });
          generatedAtEl.textContent = `数据生成时间：${display}`;
        }

        data.texts.forEach((text) => {
          const sentenceCount = Array.isArray(text.sentences) ? text.sentences.length : 0;
          const card = document.createElement("article");
          card.className = "text-card";
          card.innerHTML = `
            <h3>${text.text_title}</h3>
            <div class="meta">篇章 ID：${text.text_id} ｜ 分句 ${sentenceCount} 条</div>
            <a href="reader.html?text_id=${encodeURIComponent(text.text_id)}">进入本篇阅读</a>
          `;
          gridEl.appendChild(card);
        });
      })();
    </script>
  </body>
</html>
