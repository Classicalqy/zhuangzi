<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>庄子文本注疏可视化</title>
    <style>
      :root {
        --bg: #f3ecdf;
        --panel: #fff9ef;
        --ink: #2d261b;
        --muted: #786751;
        --line: #d8ccb8;
        --accent: #8f642d;
        --accent-soft: #f4e4ca;
        --ok: #2f6a45;
        --mark: #ffe1ac;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: radial-gradient(circle at 0% 0%, #fff7e8 0%, var(--bg) 55%, #ece0ce 100%);
        font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
      }

      .sidebar {
        padding: 18px 14px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, #fbf3e4 0%, #f1e5d2 100%);
        overflow: auto;
      }

      .sidebar h1 {
        margin: 0;
        font-size: 20px;
      }

      .sidebar p {
        margin: 10px 0 14px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 13px;
      }

      .home-link {
        display: inline-block;
        margin: 0 0 12px;
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
      }

      .home-link:hover {
        text-decoration: underline;
      }

      .text-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .text-btn {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        font-size: 15px;
        background: rgba(255, 250, 239, 0.82);
        color: var(--ink);
        cursor: pointer;
      }

      .text-btn:hover {
        border-color: var(--accent);
      }

      .text-btn.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        font-weight: 700;
      }

      .main {
        padding: 20px 24px 28px;
        overflow: auto;
      }

      .head h2 {
        margin: 0;
        font-size: 28px;
      }

      .summary {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .search-box {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
      }

      .search-box input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fffdf8;
        font-size: 15px;
        color: var(--ink);
      }

      .search-box button {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 0 12px;
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
      }

      .search-box button:hover {
        border-color: var(--accent);
      }

      .search-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .search-results {
        margin-top: 8px;
        max-height: 230px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .search-result {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
      }

      .search-result:hover {
        border-color: var(--accent);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 1px 7px;
        margin-right: 8px;
        font-size: 12px;
        color: #fff;
        background: var(--accent);
      }

      .section {
        margin-top: 20px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 251, 243, 0.9);
        padding: 14px;
      }

      .section h3 {
        margin: 0;
        font-size: 18px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .ghost-btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        height: 32px;
        padding: 0 10px;
        cursor: pointer;
      }

      .text-flow {
        margin-top: 12px;
        line-height: 2;
        font-size: 19px;
        word-break: break-word;
      }

      .sentence {
        border-radius: 6px;
        padding: 2px 4px;
        white-space: pre-wrap;
      }

      .sentence.has-annotation {
        cursor: pointer;
        border-bottom: 1px dashed #9b875f;
      }

      .sentence.has-annotation:hover {
        background: #fff0cf;
      }

      .sentence.in-interpretation {
        background: var(--mark);
      }

      .sentence.jump {
        animation: jump-flash 1s ease;
      }

      @keyframes jump-flash {
        0% {
          background: #ffd79a;
        }
        100% {
          background: transparent;
        }
      }

      .interp-list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 320px;
        overflow: auto;
      }

      .interp-item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px 11px;
        text-align: left;
        cursor: pointer;
      }

      .interp-item:hover {
        border-color: var(--accent);
      }

      .interp-item.active {
        border-color: var(--accent);
        background: #fff1d8;
      }

      .interp-meta {
        font-size: 13px;
        color: var(--muted);
      }

      .interp-snippet {
        margin-top: 6px;
        font-size: 14px;
        line-height: 1.6;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(30, 21, 10, 0.38);
      }

      .modal.open {
        display: flex;
      }

      .dialog {
        width: min(920px, 100%);
        max-height: 86vh;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fffdf8;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .dialog-head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .dialog-title {
        margin: 0;
        font-size: 19px;
      }

      .dialog-sub {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .close {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
        font-size: 20px;
      }

      .dialog-body {
        overflow: auto;
        padding: 14px 16px 18px;
      }

      .note-section h4 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .note-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }

      .note {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px 11px;
      }

      .note-meta {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .note-id {
        display: inline-block;
        margin-right: 8px;
      }

      .note-content {
        margin: 0;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .collapse-wrap {
        margin-top: 8px;
      }

      .collapse-toggle {
        cursor: pointer;
        color: var(--accent);
        font-size: 13px;
      }

      .collapse-toggle:hover {
        text-decoration: underline;
      }

      .empty {
        color: var(--muted);
        margin: 6px 0 0;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
        }

        .text-list {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .main {
          padding: 14px;
        }

        .search-box {
          grid-template-columns: 1fr 1fr;
        }

        .search-box input {
          grid-column: 1 / -1;
        }

        .text-flow {
          font-size: 18px;
        }

        .text-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>庄子注疏可视化</h1>
        <p>原文按分句连续呈现。点击带下划线的分句查看字义注；跨句阐释在下方列表单独查看。</p>
        <a class="home-link" href="index.html">返回首页</a>
        <div id="textList" class="text-list"></div>
      </aside>

      <main class="main">
        <section class="head">
          <h2 id="title"></h2>
          <div id="summary" class="summary"></div>

          <div class="search-box">
            <input id="searchInput" type="text" placeholder="搜索原文/注释/阐释（当前篇章）" />
            <button id="searchBtn" type="button">搜索</button>
            <button id="clearSearchBtn" type="button">清空</button>
          </div>
          <div id="searchMeta" class="search-meta"></div>
          <div id="searchResults" class="search-results"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h3>原文</h3>
            <button id="clearRangeBtn" class="ghost-btn" type="button">清除跨句高亮</button>
          </div>
          <div id="textFlow" class="text-flow"></div>
        </section>

        <section class="section">
          <h3>跨句阐释</h3>
          <div id="interpList" class="interp-list"></div>
        </section>
      </main>
    </div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog">
        <div class="dialog-head">
          <div>
            <h3 id="dialogTitle" class="dialog-title"></h3>
            <p id="dialogSub" class="dialog-sub"></p>
          </div>
          <button id="closeBtn" class="close" type="button" aria-label="关闭">×</button>
        </div>
        <div id="dialogBody" class="dialog-body"></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script>
      (function () {
        const data = window.ZZ_DATA;
        if (!data || !Array.isArray(data.texts) || data.texts.length === 0) {
          document.body.innerHTML = '<p style="padding:20px;">数据未加载成功，请先运行数据生成脚本。</p>';
          return;
        }

        const textListEl = document.getElementById("textList");
        const titleEl = document.getElementById("title");
        const summaryEl = document.getElementById("summary");

        const textFlowEl = document.getElementById("textFlow");
        const interpListEl = document.getElementById("interpList");

        const searchInputEl = document.getElementById("searchInput");
        const searchBtnEl = document.getElementById("searchBtn");
        const clearSearchBtnEl = document.getElementById("clearSearchBtn");
        const searchMetaEl = document.getElementById("searchMeta");
        const searchResultsEl = document.getElementById("searchResults");
        const clearRangeBtnEl = document.getElementById("clearRangeBtn");

        const modalEl = document.getElementById("modal");
        const dialogTitleEl = document.getElementById("dialogTitle");
        const dialogSubEl = document.getElementById("dialogSub");
        const dialogBodyEl = document.getElementById("dialogBody");
        const closeBtnEl = document.getElementById("closeBtn");

        const textById = new Map(data.texts.map((item) => [item.text_id, item]));
        const interpretationsByText = {};
        data.interpretations.forEach((item, idx) => {
          const textId = item.text_id;
          if (!interpretationsByText[textId]) interpretationsByText[textId] = [];
          interpretationsByText[textId].push({ ...item, _idx: idx });
        });
        Object.keys(interpretationsByText).forEach((key) => {
          interpretationsByText[key].sort(
            (a, b) => a.start_sentence_id - b.start_sentence_id || a.end_sentence_id - b.end_sentence_id
          );
        });

        function queryTextId() {
          const raw = new URLSearchParams(window.location.search).get("text_id");
          const id = Number.parseInt(raw || "", 10);
          if (Number.isNaN(id)) return null;
          return textById.has(id) ? id : null;
        }

        function syncQueryTextId(textId) {
          const url = new URL(window.location.href);
          url.searchParams.set("text_id", String(textId));
          history.replaceState(null, "", `${url.pathname}?${url.searchParams.toString()}`);
        }

        const state = {
          currentTextId: queryTextId() ?? data.texts[0].text_id,
          highlightedRange: null,
          selectedInterpretationIdx: null,
          sentenceNodeMap: new Map(),
        };
        const COLLAPSE_SPAN_THRESHOLD = 10;

        function currentText() {
          return textById.get(state.currentTextId);
        }

        function currentInterpretations() {
          return interpretationsByText[state.currentTextId] || [];
        }

        function sentenceRangeText(text, startId, endId) {
          return text.sentences
            .filter((item) => item.sentence_id >= startId && item.sentence_id <= endId)
            .map((item) => item.sentence)
            .join("");
        }

        function shouldCollapseRange(startId, endId) {
          return Math.abs(endId - startId) >= COLLAPSE_SPAN_THRESHOLD;
        }

        function buildRangeTextNode(text, startId, endId) {
          const rangeText = sentenceRangeText(text, startId, endId);
          const spanCount = Math.abs(endId - startId) + 1;

          if (!shouldCollapseRange(startId, endId)) {
            const p = document.createElement("p");
            p.className = "note-content";
            p.style.marginTop = "8px";
            p.textContent = rangeText;
            return p;
          }

          const details = document.createElement("details");
          details.className = "collapse-wrap";

          const summary = document.createElement("summary");
          summary.className = "collapse-toggle";
          summary.textContent = `展开原文（句段 ${startId}-${endId}，共 ${spanCount} 句）`;

          const p = document.createElement("p");
          p.className = "note-content";
          p.style.marginTop = "8px";
          p.textContent = rangeText;

          details.appendChild(summary);
          details.appendChild(p);
          return details;
        }

        function snippet(text, max = 64) {
          if (!text) return "";
          return text.length > max ? text.slice(0, max) + "..." : text;
        }

        function renderTextList() {
          textListEl.innerHTML = "";
          data.texts.forEach((text) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "text-btn" + (text.text_id === state.currentTextId ? " active" : "");
            btn.textContent = text.text_title;
            btn.addEventListener("click", () => {
              state.currentTextId = text.text_id;
              state.highlightedRange = null;
              state.selectedInterpretationIdx = null;
              syncQueryTextId(text.text_id);
              searchInputEl.value = "";
              clearSearchResults();
              closeModal();
              renderAll();
            });
            textListEl.appendChild(btn);
          });
        }

        function renderSummary() {
          const text = currentText();
          const interpCount = currentInterpretations().length;
          const annoCount = text.sentences.filter((item) => {
            const key = `${text.text_id}-${item.sentence_id}`;
            return Boolean(data.annotations_by_key[key] && data.annotations_by_key[key].length);
          }).length;

          titleEl.textContent = text.text_title;
          summaryEl.textContent = `共 ${text.sentences.length} 个分句；单句注释命中 ${annoCount} 句；跨句阐释 ${interpCount} 条。`;
        }

        function renderTextFlow() {
          const text = currentText();
          state.sentenceNodeMap.clear();
          textFlowEl.innerHTML = "";

          text.sentences.forEach((item) => {
            const span = document.createElement("span");
            span.className = "sentence";
            span.dataset.sentenceId = String(item.sentence_id);
            span.textContent = item.sentence;

            const key = `${text.text_id}-${item.sentence_id}`;
            const hasAnnotation = Boolean(data.annotations_by_key[key] && data.annotations_by_key[key].length);

            if (hasAnnotation) {
              span.classList.add("has-annotation");
              span.title = "点击查看字义注释";
              span.addEventListener("click", () => {
                openAnnotationModal(text, item);
              });
            }

            if (
              state.highlightedRange &&
              item.sentence_id >= state.highlightedRange.start &&
              item.sentence_id <= state.highlightedRange.end
            ) {
              span.classList.add("in-interpretation");
            }

            textFlowEl.appendChild(span);
            if (item.break_after) {
              textFlowEl.appendChild(document.createElement("br"));
              textFlowEl.appendChild(document.createElement("br"));
            }
            state.sentenceNodeMap.set(item.sentence_id, span);
          });
        }

        function renderInterpretationList() {
          const text = currentText();
          const list = currentInterpretations();
          interpListEl.innerHTML = "";

          if (!list.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "暂无跨句阐释。";
            interpListEl.appendChild(empty);
            return;
          }

          list.forEach((item, idx) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "interp-item" + (state.selectedInterpretationIdx === idx ? " active" : "");

            const meta = document.createElement("div");
            meta.className = "interp-meta";
            meta.textContent = `${item.commentator}（${item.dynasty}）｜句段 ${item.start_sentence_id}-${item.end_sentence_id}`;

            const snip = document.createElement("div");
            snip.className = "interp-snippet";
            snip.textContent = snippet(sentenceRangeText(text, item.start_sentence_id, item.end_sentence_id), 88);

            btn.appendChild(meta);
            btn.appendChild(snip);

            btn.addEventListener("click", () => {
              state.highlightedRange = { start: item.start_sentence_id, end: item.end_sentence_id };
              state.selectedInterpretationIdx = idx;
              renderTextFlow();
              renderInterpretationList();
              scrollToSentence(item.start_sentence_id);
              openInterpretationModal(text, item);
            });

            interpListEl.appendChild(btn);
          });
        }

        function renderNoteSection(title, notes, contentBuilder) {
          const section = document.createElement("section");
          section.className = "note-section";

          const heading = document.createElement("h4");
          heading.textContent = title;
          section.appendChild(heading);

          if (!notes.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "暂无相关内容";
            section.appendChild(empty);
            return section;
          }

          const listEl = document.createElement("div");
          listEl.className = "note-list";

          notes.forEach((item) => {
            const noteEl = document.createElement("article");
            noteEl.className = "note";

            const metaEl = document.createElement("div");
            metaEl.className = "note-meta";
            metaEl.textContent = `${item.commentator}（${item.dynasty}）`;

            const contentEl = document.createElement("p");
            contentEl.className = "note-content";
            contentEl.textContent = contentBuilder(item);

            noteEl.appendChild(metaEl);
            noteEl.appendChild(contentEl);
            listEl.appendChild(noteEl);
          });

          section.appendChild(listEl);
          return section;
        }

        function renderAnnotationSection(notes) {
          const section = document.createElement("section");
          section.className = "note-section";

          const heading = document.createElement("h4");
          heading.textContent = "字义注释";
          section.appendChild(heading);

          if (!notes.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "暂无相关内容";
            section.appendChild(empty);
            return section;
          }

          const listEl = document.createElement("div");
          listEl.className = "note-list";

          notes.forEach((item) => {
            const noteEl = document.createElement("article");
            noteEl.className = "note";

            const metaEl = document.createElement("div");
            metaEl.className = "note-meta";
            const idText = item.annotation_id != null ? String(item.annotation_id) : "-";
            metaEl.innerHTML = `<span class="note-id">#${idText}</span>${item.commentator}（${item.dynasty}）`;

            const contentEl = document.createElement("p");
            contentEl.className = "note-content";
            contentEl.textContent = item.content || "（空）";

            noteEl.appendChild(metaEl);
            noteEl.appendChild(contentEl);
            listEl.appendChild(noteEl);
          });

          section.appendChild(listEl);
          return section;
        }

        function renderCoveredInterpretationSection(text, notes) {
          const section = document.createElement("section");
          section.className = "note-section";

          const heading = document.createElement("h4");
          heading.textContent = "涉及该句的跨句阐释";
          section.appendChild(heading);

          if (!notes.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "暂无相关内容";
            section.appendChild(empty);
            return section;
          }

          const listEl = document.createElement("div");
          listEl.className = "note-list";

          notes.forEach((item) => {
            const noteEl = document.createElement("article");
            noteEl.className = "note";

            const commentatorEl = document.createElement("div");
            commentatorEl.className = "note-meta";
            commentatorEl.textContent = `注者：${item.commentator}（${item.dynasty}）`;

            const sourceLabelEl = document.createElement("div");
            sourceLabelEl.className = "note-meta";
            sourceLabelEl.textContent = "原文：";

            const sourceNode = buildRangeTextNode(text, item.start_sentence_id, item.end_sentence_id);

            const interpLabelEl = document.createElement("div");
            interpLabelEl.className = "note-meta";
            interpLabelEl.textContent = "阐释：";

            const interpContentEl = document.createElement("p");
            interpContentEl.className = "note-content";
            interpContentEl.textContent = item.content;

            noteEl.appendChild(commentatorEl);
            noteEl.appendChild(sourceLabelEl);
            noteEl.appendChild(sourceNode);
            noteEl.appendChild(interpLabelEl);
            noteEl.appendChild(interpContentEl);
            listEl.appendChild(noteEl);
          });

          section.appendChild(listEl);
          return section;
        }

        function openModal(title, subtitle, sections) {
          dialogTitleEl.textContent = title;
          dialogSubEl.textContent = subtitle;
          dialogBodyEl.innerHTML = "";
          sections.forEach((section) => dialogBodyEl.appendChild(section));
          modalEl.classList.add("open");
        }

        function openAnnotationModal(text, sentence) {
          const key = `${text.text_id}-${sentence.sentence_id}`;
          const annotations = data.annotations_by_key[key] || [];
          const coveredInterpretations = currentInterpretations().filter(
            (item) => sentence.sentence_id >= item.start_sentence_id && sentence.sentence_id <= item.end_sentence_id
          );

          const sections = [
            renderAnnotationSection(annotations),
            renderCoveredInterpretationSection(text, coveredInterpretations),
          ];

          openModal(
            `【${text.text_title}】第 ${sentence.sentence_id} 句：${sentence.sentence}`,
            `单句注释 ${annotations.length} 条；覆盖本句的跨句阐释 ${coveredInterpretations.length} 条。`,
            sections
          );
        }

        function openInterpretationModal(text, interpretation) {
          const pseudoNote = {
            commentator: interpretation.commentator,
            dynasty: interpretation.dynasty,
            content: interpretation.content,
          };

          const rangeSection = document.createElement("section");
          rangeSection.className = "note-section";
          const rangeTitle = document.createElement("h4");
          rangeTitle.textContent = "对应原文句段";
          rangeSection.appendChild(rangeTitle);
          rangeSection.appendChild(
            buildRangeTextNode(text, interpretation.start_sentence_id, interpretation.end_sentence_id)
          );

          const interpSection = renderNoteSection("阐释内容", [pseudoNote], (item) => item.content);

          openModal(
            `【${text.text_title}】句段 ${interpretation.start_sentence_id}-${interpretation.end_sentence_id}`,
            `${interpretation.commentator}（${interpretation.dynasty}）`,
            [rangeSection, interpSection]
          );
        }

        function closeModal() {
          modalEl.classList.remove("open");
        }

        function scrollToSentence(sentenceId) {
          const node = state.sentenceNodeMap.get(sentenceId);
          if (!node) return;
          node.scrollIntoView({ behavior: "smooth", block: "center" });
          node.classList.remove("jump");
          void node.offsetWidth;
          node.classList.add("jump");
        }

        function clearSearchResults() {
          searchMetaEl.textContent = "";
          searchResultsEl.innerHTML = "";
        }

        function renderSearchResults(results, query) {
          searchResultsEl.innerHTML = "";
          searchMetaEl.textContent = `关键词“${query}”命中 ${results.length} 条（当前篇章）。`;

          if (!results.length) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "没有匹配结果。";
            searchResultsEl.appendChild(empty);
            return;
          }

          results.slice(0, 120).forEach((item) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "search-result";

            const label = document.createElement("span");
            label.className = "badge";
            label.textContent = item.type;

            const text = document.createElement("span");
            text.textContent = item.summary;

            btn.appendChild(label);
            btn.appendChild(text);

            btn.addEventListener("click", () => {
              if (item.kind === "sentence") {
                scrollToSentence(item.sentenceId);
              } else if (item.kind === "annotation") {
                const sentence = currentText().sentences.find((s) => s.sentence_id === item.sentenceId);
                if (sentence) {
                  scrollToSentence(item.sentenceId);
                  openAnnotationModal(currentText(), sentence);
                }
              } else if (item.kind === "interpretation") {
                state.highlightedRange = { start: item.data.start_sentence_id, end: item.data.end_sentence_id };
                state.selectedInterpretationIdx = item.index;
                renderTextFlow();
                renderInterpretationList();
                scrollToSentence(item.data.start_sentence_id);
                openInterpretationModal(currentText(), item.data);
              }
            });

            searchResultsEl.appendChild(btn);
          });

          if (results.length > 120) {
            const tip = document.createElement("p");
            tip.className = "empty";
            tip.textContent = `结果过多，仅展示前 120 条。`;
            searchResultsEl.appendChild(tip);
          }
        }

        function doSearch() {
          const query = searchInputEl.value.trim();
          if (!query) {
            clearSearchResults();
            return;
          }

          const text = currentText();
          const interps = currentInterpretations();
          const results = [];

          text.sentences.forEach((sentence) => {
            if (sentence.sentence.includes(query)) {
              results.push({
                kind: "sentence",
                type: "原文",
                sentenceId: sentence.sentence_id,
                summary: `第 ${sentence.sentence_id} 句：${snippet(sentence.sentence, 80)}`,
              });
            }
          });

          text.sentences.forEach((sentence) => {
            const key = `${text.text_id}-${sentence.sentence_id}`;
            const annos = data.annotations_by_key[key] || [];
            annos.forEach((anno) => {
              const source = `${anno.commentator}${anno.dynasty}${anno.content}`;
              if (source.includes(query)) {
                results.push({
                  kind: "annotation",
                  type: "注释",
                  sentenceId: sentence.sentence_id,
                  summary: `第 ${sentence.sentence_id} 句｜${anno.commentator}：${snippet(anno.content, 66)}`,
                });
              }
            });
          });

          interps.forEach((item, idx) => {
            const source = `${item.commentator}${item.dynasty}${item.content}`;
            if (source.includes(query)) {
              results.push({
                kind: "interpretation",
                type: "阐释",
                data: item,
                index: idx,
                summary: `句段 ${item.start_sentence_id}-${item.end_sentence_id}｜${item.commentator}：${snippet(
                  item.content,
                  66
                )}`,
              });
            }
          });

          renderSearchResults(results, query);
        }

        function renderAll() {
          renderTextList();
          renderSummary();
          renderTextFlow();
          renderInterpretationList();
        }

        searchBtnEl.addEventListener("click", doSearch);
        clearSearchBtnEl.addEventListener("click", () => {
          searchInputEl.value = "";
          clearSearchResults();
        });
        searchInputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter") doSearch();
        });

        clearRangeBtnEl.addEventListener("click", () => {
          state.highlightedRange = null;
          state.selectedInterpretationIdx = null;
          renderTextFlow();
          renderInterpretationList();
        });

        closeBtnEl.addEventListener("click", closeModal);
        modalEl.addEventListener("click", (event) => {
          if (event.target === modalEl) closeModal();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeModal();
        });

        syncQueryTextId(state.currentTextId);
        renderAll();
      })();
    </script>
  </body>
</html>
